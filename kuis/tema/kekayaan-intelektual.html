<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HOAKS DAN LITERASI DIGITAL</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
/* ===== GLOBAL ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#e0f2fe,#f8fafc);
  display:flex;
  justify-content:center;
  padding:20px;
  color:#0f172a;
}

/* ===== LAYOUT ===== */
.wrap{max-width:900px;width:100%;}
.card{
  background:white;
  border-radius:24px;
  box-shadow:0 20px 40px rgba(0,0,0,0.08);
  overflow:hidden;
}

/* ===== TOPBAR ===== */
.topbar{
  display:flex;
  align-items:center;
  gap:12px;
  padding:16px;
}
.back-btn{
  background:#2563eb;
  color:white;
  border:none;
  width:44px;
  height:44px;
  border-radius:14px;
  cursor:pointer;
  font-size:18px;
}
.title h1{
  font-size:1.2rem;
  font-weight:600;
}

.intro{
  padding:0 20px 10px;
  color:#334155;
}

.meta{
  display:flex;
  gap:8px;
  padding:0 20px 10px;
}
.chip{
  background:#e0f2fe;
  padding:6px 10px;
  border-radius:10px;
  font-size:12px;
}

/* ===== CONTENT ===== */
.content{
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.qbox{
  background:#f8fafc;
  border:1px solid #e2e8f0;
  padding:20px;
  border-radius:20px;
}

.qheader{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}

.badge{
  background:linear-gradient(135deg,#38bdf8,#6366f1);
  color:white;
  width:32px;
  height:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  font-weight:600;
}

.qtitle{font-weight:600;}

.qdesc{
  margin-bottom:12px;
  color:#334155;
}

/* ===== OPTIONS ===== */
.options{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.opt{
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px;
  border-radius:16px;
  background:white;
  border:1px solid #e2e8f0;
  cursor:pointer;
  transition:0.2s;
}

.opt:hover{
  background:#e0f2fe;
  border-color:#38bdf8;
}

/* ===== RESULT ===== */
.result{
  margin-top:10px;
  font-weight:600;
}

.explain{
  margin-top:10px;
  font-size:14px;
  color:#334155;
}

/* ===== BUTTON ===== */
.btn{
  padding:14px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  margin-top:10px;
  width:100%;
  font-weight:600;
}

.btn-primary{background:#2563eb;color:white;}
.btn-secondary{background:#6366f1;color:white;}
html {
  font-size: 18px; /* default biasanya 16px */
}
</style>
</head>

<body>

<div class="wrap">
<div class="card">

<div class="topbar">
  <button class="back-btn" onclick="history.back()">←</button>
  <div class="title">
    <h1>Kuis – Kekayaan Intelektual

    </h1>
  </div>
</div>

<div class="intro">
  Pilih jawaban yang paling tepat untuk menyelesaikan kuis ini.
</div>

<div class="content" id="quiz"></div>

<div style="padding:20px">
  <button class="btn btn-primary" onclick="checkAnswers()">Cek Jawaban</button>
  <button class="btn btn-secondary" onclick="resetQuiz()">Reset</button>
  <div class="result" id="score"></div>
</div>

</div>
</div>

<script>
const quizData = [

{
type:"radio",
title:"Hak Cipta",
q:"Apa yang dimaksud hak cipta?",
options:[
"Hak menggunakan akun orang lain",
"Hak atas karya yang dibuat seseorang",
"Hak mengambil karya tanpa izin",
"Hak menyebarkan semua file"
],
answer:1,
explain:"Hak cipta melindungi karya agar tidak digunakan sembarangan oleh orang lain."
},

{
type:"truefalse",
title:"Plagiarisme",
q:"Mengambil karya orang lain tanpa mencantumkan sumber disebut plagiarisme.",
answer:true,
explain:"Plagiarisme adalah tindakan mengambil karya tanpa penghargaan kepada pembuat asli."
},

{
type:"radio",
title:"Etika Digital",
q:"Apa yang sebaiknya dilakukan sebelum repost karya orang lain di media sosial?",
options:[
"Langsung upload ulang",
"Menghapus nama pembuat",
"Meminta izin dan mencantumkan kredit",
"Mengaku karya sendiri"
],
answer:2,
explain:"Menghargai karya orang lain merupakan bagian dari etika digital."
},

{
type:"radio",
title:"Tebak Gambar",
q:"Kesalahan pada repost konten tanpa kredit adalah...",
options:[
"Menggunakan filter",
"Tidak mencantumkan kredit pembuat",
"Menggunakan emoji",
"Menggunakan internet"
],
answer:1,
explain:"Kredit kepada pembuat asli sangat penting dalam penggunaan karya digital."
},

{
type:"text",
title:"Isian",
q:"Tindakan menyalin karya tanpa izin disebut ______.",
answer:"plagiarisme",
explain:"Plagiarisme melanggar etika dan dapat merugikan pembuat karya."
},

{
type:"radio",
title:"Pembajakan",
q:"Mengunduh film bajakan termasuk...",
options:[
"Tindakan legal",
"Pelanggaran hak cipta",
"Edukasi digital",
"Bentuk apresiasi karya"
],
answer:1,
explain:"Film dan musik memiliki hak cipta yang harus dihormati."
},

{
type:"radio",
title:"Studi Kasus",
q:"Rina mengambil ilustrasi dari internet lalu mengaku sebagai pembuatnya. Apa pelanggaran yang dilakukan?",
options:[
"Verifikasi fakta",
"Plagiarisme",
"Literasi digital",
"Editing biasa"
],
answer:1,
explain:"Mengaku karya orang lain sebagai milik sendiri termasuk plagiarisme."
},

{
type:"radio",
title:"Creative Commons",
q:"Lisensi Creative Commons digunakan untuk...",
options:[
"Membatasi semua karya selamanya",
"Mengatur penggunaan karya secara legal",
"Menghapus hak cipta",
"Menjual akun media sosial"
],
answer:1,
explain:"Creative Commons membantu pembuat karya mengatur penggunaan karyanya."
},

{
type:"checkbox",
title:"Etika Berkarya",
q:"Pilih 2 tindakan menghargai karya orang lain!",
options:[
"Memberi kredit pembuat",
"Menghapus watermark",
"Meminta izin penggunaan karya",
"Mengaku karya sendiri"
],
answer:[0,2],
explain:"Menghargai karya orang lain penting dalam dunia digital."
},

{
type:"radio",
title:"Istilah",
q:"Hak hukum atas karya ciptaan seseorang disebut...",
options:[
"Lisensi",
"Hak cipta",
"Plagiarisme",
"Validasi"
],
answer:1,
explain:"Hak cipta melindungi hasil karya intelektual."
},

{
type:"text",
title:"Tebak Istilah",
q:"Hak hukum atas karya ciptaan seseorang disebut...",
answer:"hak cipta",
explain:"Hak cipta melindungi karya dari penggunaan tanpa izin."
},

{
type:"radio",
title:"Urutan Logika",
q:"Langkah terakhir dalam menggunakan karya orang lain adalah...",
options:[
"Meminta izin",
"Memeriksa lisensi",
"Menggunakan karya",
"Memberi kredit"
],
answer:3,
explain:"Setelah digunakan, wajib memberi kredit kepada pembuat."
},

{
type:"radio",
title:"Dampak",
q:"Apa dampak pembajakan digital?",
options:[
"Pembuat karya dirugikan",
"Hak cipta semakin kuat",
"Semua karya legal",
"Tidak ada dampak"
],
answer:0,
explain:"Pembajakan merugikan pembuat karya secara ekonomi."
},

{
type:"truefalse",
title:"Benar / Salah",
q:"Menghapus watermark dari gambar orang lain termasuk tindakan tidak etis.",
answer:true,
explain:"Watermark menunjukkan identitas pembuat karya."
},

{
type:"checkbox",
title:"Etika Digital",
q:"Pilih 2 tindakan yang menghargai hak cipta!",
options:[
"Memberi sumber karya",
"Mengaku karya sendiri",
"Meminta izin penggunaan",
"Menghapus nama pembuat"
],
answer:[0,2],
explain:"Menghargai hak cipta penting dalam dunia digital."
}

];

const quizContainer = document.getElementById("quiz");

quizData.forEach((q,i)=>{
let html = `<div class="qbox">

<div class="qheader">
  <div class="badge">${i+1}</div>
  <div class="qtitle">${q.title}</div>
</div>

<div class="qdesc">${q.q}</div>
<div class="options">`;

if(q.type==="radio"){
q.options.forEach((opt,j)=>{
html+=`<label class="opt">
<input type="radio" name="q${i}" value="${j}"> ${opt}
</label>`;
});
}

if(q.type==="checkbox"){
q.options.forEach((opt,j)=>{
html+=`<label class="opt">
<input type="checkbox" name="q${i}" value="${j}"> ${opt}
</label>`;
});
}

if(q.type==="text"){
html+=`<input type="text" id="q${i}" class="opt">`;
}

if(q.type==="truefalse"){
html+=`
<label class="opt"><input type="radio" name="q${i}" value="true"> Benar</label>
<label class="opt"><input type="radio" name="q${i}" value="false"> Salah</label>
`;
}

html+=`</div>
<div class="explain" id="exp${i}"></div>
</div>`;

quizContainer.innerHTML+=html;
});

function checkAnswers(){
let score=0;

quizData.forEach((q,i)=>{
let correct=false;

if(q.type==="radio"){
let val=document.querySelector(`input[name=q${i}]:checked`);
if(val && parseInt(val.value)===q.answer) correct=true;
}

if(q.type==="checkbox"){
let vals=[...document.querySelectorAll(`input[name=q${i}]:checked`)].map(v=>parseInt(v.value));
if(JSON.stringify(vals.sort())===JSON.stringify(q.answer)) correct=true;
}

if(q.type==="text"){
let val=document.getElementById(`q${i}`).value.toLowerCase();
if(val===q.answer) correct=true;
}

if(q.type==="truefalse"){
let val=document.querySelector(`input[name=q${i}]:checked`);
if(val && (val.value==="true")===q.answer) correct=true;
}

if(correct) score++;

document.getElementById(`exp${i}`).innerHTML =
(correct?"✅ Benar<br>":"❌ Salah<br>")+q.explain;
});

document.getElementById("score").innerHTML="Skor: "+score+"/"+quizData.length;
}

function resetQuiz(){
location.reload();
}
</script>

</body>
</html>
